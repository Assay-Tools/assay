name: Package Discovery

on:
  schedule:
    # Run twice daily: 06:00 and 18:00 UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum packages to discover'
        required: false
        default: '50000'
      source:
        description: 'Discovery source'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - github
          - npm
          - pypi
          - mcp_registry
          - skills
          - openclaw
          - smithery
          - glama
          - cursor_directory
          - docker_mcp
          - mcp_run
          - mcp_so
          - crates_io

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GITHUB_TOKEN: ${{ secrets.GH_DISCOVERY_TOKEN }}
      SMITHERY_TOKEN: ${{ secrets.SMITHERY_TOKEN }}
      GLAMA_TOKEN: ${{ secrets.GLAMA_TOKEN }}
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -e .

      - name: Run discovery
        run: |
          LIMIT="${{ github.event.inputs.limit || '50000' }}"
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          echo "Running discovery: source=$SOURCE limit=$LIMIT"
          python -m assay.evaluation.discovery --limit "$LIMIT" --source "$SOURCE" 2>&1 | tee discovery-output.txt

      - name: Create summary
        run: |
          echo "## Package Discovery Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 discovery-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
